[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ember-qc"
version = "0.5.0"
description = "Quantum minor-embedding benchmark suite for D-Wave hardware topologies"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"

dependencies = [
    "numpy>=1.20.0",
    "pandas>=1.3.0",
    "networkx>=2.6.0",
    "tqdm>=4.62.0",
    "minorminer>=0.2.0",
    "dwave-networkx>=0.8.0",
    "platformdirs>=3.0.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
# Analysis / plotting (same deps as ember-qc-analysis but without the separate install)
analysis = [
    "matplotlib>=3.4.0",
    "seaborn>=0.11.0",
    "scipy>=1.7.0",
]
# CHARME algorithm (PyTorch GNN approach)
charme = [
    "torch>=1.9.0",
    "karateclub>=1.3.0",
]
# Development / testing
dev = [
    "pytest>=7.0.0",
    "pytest-timeout",
]

[project.scripts]
ember = "ember_qc.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ember_qc"]
# Hatchling includes all files under the declared packages (including JSON,
# CSV, etc.) by default. No additional include declarations are needed.
# Verify with: python -m build && unzip -l dist/*.whl | grep graphs

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "tests/",
    "LICENSE",
    "README.md",
    "CHANGELOG.md",
]
