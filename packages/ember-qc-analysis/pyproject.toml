[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ember-qc-analysis"
version = "0.5.0"
description = "Post-benchmark analysis, plots, and statistics for ember-qc results"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"

dependencies = [
    "numpy>=1.20.0",
    "pandas>=1.3.0",
    "matplotlib>=3.4.0",
    "seaborn>=0.11.0",
    "scipy>=1.7.0",
    "networkx>=2.6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[project.scripts]
ember-qc-analysis = "ember_qc_analysis.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ember_qc_analysis"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "LICENSE",
    "README.md",
    "CHANGELOG.md",
]
